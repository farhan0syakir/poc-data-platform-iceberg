# Spark configuration for Iceberg

# Basic configuration
spark.app.name=IcebergDataPlatform
spark.master=spark://spark-master:7077

# Driver and executor configuration
spark.driver.memory=2g
spark.executor.memory=2g
spark.executor.cores=2

# Iceberg configuration
spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.nessie=org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.nessie.catalog-impl=org.apache.iceberg.nessie.NessieCatalog
spark.sql.catalog.nessie.warehouse=s3a://warehouse/
spark.sql.catalog.nessie.uri.auth_type=none
spark.sql.catalog.nessie.uri=http://nessie:19120/api/v1
spark.sql.catalog.nessie.ref=main

# Local Iceberg catalog for testing
spark.sql.catalog.local=org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.local.type=hadoop
spark.sql.catalog.local.warehouse=/tmp/warehouse

# S3/MinIO configuration
spark.hadoop.fs.s3a.endpoint=http://minio:9000
spark.hadoop.fs.s3a.access.key=minioadmin
spark.hadoop.fs.s3a.secret.key=minioadmin
spark.hadoop.fs.s3a.path.style.access=true
spark.hadoop.fs.s3a.connection.ssl.enabled=false

# Hadoop configuration
spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem

# Enable partition pushdown and other optimizations
spark.sql.iceberg.optimize.none.partition.parallel.tasks=true

